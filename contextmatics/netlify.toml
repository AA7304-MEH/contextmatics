[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    # Optimized Content Security Policy for Clerk, Razorpay, PayPal, and Supabase
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://checkout.razorpay.com https://www.paypal.com https://www.sandbox.paypal.com https://cdn.clerk.io https://*.clerk.accounts.dev; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.supabase.co https://res.cloudinary.com https://img.clerk.com https://*.clerk.com https://images.unsplash.com https://pollinations.ai; media-src 'self' blob: https://res.cloudinary.com https://*.supabase.co; connect-src 'self' https://*.supabase.co https://*.clerk.dev https://*.clerk.accounts.dev https://generativelanguage.googleapis.com https://api.razorpay.com https://www.paypal.com https://www.sandbox.paypal.com https://api.ayrshare.com; frame-src https://api.razorpay.com https://www.paypal.com https://www.sandbox.paypal.com;"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[dev]
  command = "npm run dev"
  port = 3000