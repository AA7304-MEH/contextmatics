[build]
  # Directory to change to before starting a build
  base = "."
  # Directory that contains the deploy-ready HTML files and assets generated by the build
  publish = "dist"
  # Default build command
  command = "npm run build"

[build.environment]
  # Node.js version for builds
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
  SECRETS_SCAN_ENABLED = "false"


[[headers]]
  # Security headers
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://checkout.razorpay.com https://www.paypal.com https://www.sandbox.paypal.com https://cdn.clerk.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.supabase.co https://res.cloudinary.com https://img.clerk.com; media-src 'self' blob: https://res.cloudinary.com https://*.supabase.co; connect-src 'self' https://*.supabase.co https://*.clerk.dev https://*.clerk.accounts.dev https://generativelanguage.googleapis.com https://api.razorpay.com https://www.paypal.com https://www.sandbox.paypal.com; frame-src https://api.razorpay.com https://www.paypal.com https://www.sandbox.paypal.com;"

[[headers]]
  # Cache static assets aggressively (hashed filenames = safe to cache indefinitely)
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  # Cache HTML files for shorter time
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# SPA fallback for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API routes (if you add serverless functions later)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[functions]
  # Directory for serverless functions (if needed)
  directory = "netlify/functions"

[dev]
  # Development server settings
  command = "npm run dev"
  port = 3000
  publish = "dist"